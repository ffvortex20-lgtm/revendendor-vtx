<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | ULTRA ADMIN</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Troca de abas
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // Carregar Painel
        function init() {
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let ativos = 0, banidos = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    if(data.status === "ativada") ativos++;
                    if(data.status === "banido") banidos++;

                    list.innerHTML += `
                        <tr>
                            <td>${data.key}</td>
                            <td><span class="status ${data.status}">${data.status}</span></td>
                            <td class="uid-col">${data.uid}</td>
                            <td class="actions">
                                <button onclick="upStat('${id}','ativada')">Ativar</button>
                                <button onclick="upStat('${id}','pausada')">Pausar</button>
                                <button class="ban" onclick="upStat('${id}','banido')">Banir</button>
                                <button class="reset" onclick="resetHWID('${id}')">Reset</button>
                                <button class="del" onclick="delKey('${id}')">Excluir</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('count-ativos').innerText = ativos;
                document.getElementById('count-banidos').innerText = banidos;
            });
        }

        window.upStat = (id, s) => update(ref(db, `KeysUsers/${id}`), { status: s });
        window.resetHWID = (id) => update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "Limpo" });
        window.delKey = (id) => confirm("Apagar?") && remove(ref(db, `KeysUsers/${id}`));

        window.gerarKey = () => {
            const k = "vtx-" + Math.floor(1000 + Math.random() * 9000);
            const id = "ADM-" + Date.now();
            set(ref(db, `KeysUsers/${id}`), {
                key: k, status: "ativada", uid: "PENDENTE", validade: "1", dias: Date.now().toString()
            });
            alert("Key: " + k);
        };

        window.enviarUpdate = () => {
            const up = {
                title: document.getElementById('up_t').value,
                desc: document.getElementById('up_d').value,
                ver: document.getElementById('up_v').value,
                link: document.getElementById('up_l').value
            };
            set(ref(db, 'Config/Update'), up).then(() => alert("Enviado!"));
        };

        init();
    </script>

    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral */
        aside { width: 220px; background: #000; border-right: 1px solid #1a1a1a; padding: 20px; flex-shrink: 0; }
        .logo { color: #00ccff; font-weight: bold; text-align: center; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .nav-link { display: block; padding: 12px; color: #666; text-decoration: none; cursor: pointer; border-radius: 5px; margin-bottom: 5px; font-weight: bold; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ccff; }

        /* Conteúdo Principal */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; background: #080808; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: #111; padding: 20px; border-radius: 10px; flex: 1; border-bottom: 2px solid #00ccff; }
        .card b { font-size: 1.5rem; color: #00ccff; display: block; }

        /* Tabela */
        .table-container { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: #444; font-size: 0.8rem; }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        .uid-col { color: #555; font-family: monospace; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }

        /* Status e Botões */
        .status { padding: 3px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .status.ativada { background: #00ff8822; color: #00ff88; }
        .status.banido { background: #ff444422; color: #ff4444; }

        .actions { display: flex; gap: 5px; }
        .actions button { padding: 5px 8px; border: 1px solid #333; background: #000; color: #ccc; cursor: pointer; border-radius: 4px; font-size: 0.7rem; }
        .actions button:hover { border-color: #00ccff; color: #00ccff; }
        .actions .ban { color: #ff4444; }
        .actions .reset { color: #00ff88; }
        .actions .del { background: #ff4444; color: #fff; border: none; }

        /* Forms */
        .tab-content { display: none; }
        .box { background: #111; padding: 25px; border-radius: 10px; max-width: 500px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: #00ccff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<aside>
    <div class="logo">VORTEX CORE</div>
    <a class="nav-link active" onclick="showTab('dash')">📊 Dashboard</a>
    <a class="nav-link" onclick="showTab('gen')">➕ Gerar Key</a>
    <a class="nav-link" onclick="showTab('up')">🚀 Enviar Update</a>
</aside>

<main>
    <div id="dash" class="tab-content" style="display:block">
        <div class="stats">
            <div class="card">Ativos<b id="count-ativos">0</b></div>
            <div class="card">Banidos<b id="count-banidos">0</b></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>KEY</th>
                        <th>STATUS</th>
                        <th>UID</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="gen" class="tab-content">
        <div class="box">
            <h3>Gerar Key Manual</h3>
            <button class="btn-main" onclick="gerarKey()">GERAR NOVA KEY AGORA</button>
        </div>
    </div>

    <div id="up" class="tab-content">
        <div class="box">
            <h3>Sistema de Update</h3>
            <input type="text" id="up_t" placeholder="Título">
            <textarea id="up_d" placeholder="Novidades"></textarea>
            <input type="text" id="up_v" placeholder="Versão">
            <input type="text" id="up_l" placeholder="Link Direto">
            <button class="btn-main" onclick="enviarUpdate()">PUBLICAR ATUALIZAÇÃO</button>
        </div>
    </div>
</main>

</body>
</html>
