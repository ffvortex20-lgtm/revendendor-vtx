<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | PAINEL GESTÃO</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configurações do seu projeto vortexdev2
        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Troca de abas sem bugar o visual
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // Carregar lista de clientes em tempo real
        function carregarClientes() {
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('clientTable');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.key}</b></td>
                            <td>${data.validade} Dias</td>
                            <td><span class="badge ${data.status}">${data.status}</span></td>
                            <td class="actions">
                                <button onclick="setSt('${id}','ativada')">Ativar</button>
                                <button class="ban" onclick="setSt('${id}','banido')">Banir</button>
                                <button class="reset" onclick="resetDevice('${id}')">Reset</button>
                                <button class="del" onclick="removerKey('${id}')">Excluir</button>
                            </td>
                        </tr>`;
                });
            });
        }

        // Funções de Gerenciamento
        window.setSt = (id, s) => update(ref(db, `KeysUsers/${id}`), { status: s });
        window.removerKey = (id) => confirm("Excluir cliente?") && remove(ref(db, `KeysUsers/${id}`));
        window.resetDevice = (id) => update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "Limpo" });

        // Gerar Key com Dias
        window.criarKeyCliente = () => {
            const prefix = document.getElementById('k_prefix').value || "vtx";
            const dias = document.getElementById('k_dias').value || "1";
            const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
            const id = "CLIENTE-" + Date.now();

            set(ref(db, `KeysUsers/${id}`), {
                key: novaKey,
                status: "ativada",
                validade: dias, // Salva os dias que você escreveu
                dias: Date.now().toString(),
                uid: "AGUARDANDO",
                device: "Criada pelo ADM",
                dispositivos: "1"
            });
            alert("Key Criada com " + dias + " dias: " + novaKey);
        };

        carregarClientes();
    </script>

    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral */
        aside { width: 220px; background: #000; border-right: 1px solid #1a1a1a; padding: 20px; flex-shrink: 0; }
        .logo { color: #00ccff; font-weight: bold; font-size: 1.2rem; margin-bottom: 30px; text-align: center; }
        .nav-link { display: block; padding: 15px; color: #777; cursor: pointer; border-radius: 8px; margin-bottom: 5px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ccff; }

        /* Área Principal */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; background: #080808; }
        .tab-content { display: none; animation: fadeIn 0.3s; }

        /* Tabela e Cards */
        .card { background: #111; border-radius: 12px; padding: 20px; border: 1px solid #1a1a1a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #444; font-size: 0.75rem; padding: 10px; border-bottom: 1px solid #1a1a1a; }
        td { padding: 12px 10px; border-bottom: 1px solid #0f0f0f; font-size: 0.85rem; }

        /* Botões */
        .actions { display: flex; gap: 5px; }
        .actions button { padding: 6px 10px; font-size: 0.7rem; border-radius: 5px; border: 1px solid #333; background: #000; color: #eee; cursor: pointer; }
        .actions .ban { color: #ff4444; }
        .actions .reset { color: #00ff88; }
        .actions .del { background: #ff4444; color: #fff; border: none; }
        .btn-main { background: #00ccff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Inputs */
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #666; font-size: 0.8rem; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 6px; box-sizing: border-box; }

        .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge.ativada { background: #00ff8811; color: #00ff88; }
        .badge.banido { background: #ff444411; color: #ff4444; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<aside>
    <div class="logo">VORTEX ADM</div>
    <div class="nav-link active" onclick="showTab('tab-clientes')">👥 Clientes</div>
    <div class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Key</div>
</aside>

<main>
    <div id="tab-clientes" class="tab-content" style="display:block">
        <h1>Gestão de Clientes</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>KEY</th>
                        <th>VALIDADE</th>
                        <th>STATUS</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="clientTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gerar" class="tab-content">
        <h1>Gerar Novo Acesso</h1>
        <div class="card" style="max-width: 400px;">
            <div class="input-group">
                <label>Prefixo da Key</label>
                <input type="text" id="k_prefix" placeholder="Ex: VORTEX-VIP">
            </div>
            <div class="input-group">
                <label>Dias de Validade</label>
                <input type="number" id="k_dias" placeholder="Ex: 30" value="1">
            </div>
            <button class="btn-main" onclick="criarKeyCliente()">GERAR E SALVAR</button>
        </div>
    </div>
</main>

</body>
</html>
