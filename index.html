<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | REVENDA PANEL</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configurações do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- NAVEGAÇÃO ---
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- LISTAGEM DE CLIENTES ---
        function init() {
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let totalVendas = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    totalVendas++;

                    list.innerHTML += `
                        <tr>
                            <td><b>${data.key || 'Sem Key'}</b></td>
                            <td><span class="status ${data.status}">${data.status}</span></td>
                            <td>${data.validade || '1'} Dias</td>
                            <td class="uid-col">${data.uid || 'Aguardando...'}</td>
                            <td class="actions">
                                <button class="reset" onclick="resetHWID('${id}')">Resetar HWID</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('count-vendas').innerText = totalVendas;
            });
        }

        // --- FUNÇÕES PERMITIDAS AO REVENDEDOR ---
        window.resetHWID = (id) => {
            if(confirm("Deseja resetar o dispositivo deste cliente?")) {
                update(ref(db, `KeysUsers/${id}`), { 
                    uid: "RESETADO", 
                    device: "Resetado pelo Revendedor" 
                });
            }
        };

        window.gerarKeyCliente = () => {
            const prefix = document.getElementById('k_prefix').value || "REV";
            const dias = document.getElementById('k_dias').value || "30";
            const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
            const id = "KEY-" + Date.now();
            
            set(ref(db, `KeysUsers/${id}`), {
                key: novaKey, 
                status: "ativada", 
                uid: "AGUARDANDO LOGIN", 
                validade: dias, 
                dias: Date.now().toString(),
                device: "Criada via Painel Revenda",
                dispositivos: "1"
            }).then(() => {
                alert("SUCESSO!\nKey Gerada: " + novaKey);
            });
        };

        init();
    </script>

    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar */
        aside { width: 220px; background: #000; border-right: 1px solid #1a1a1a; padding: 20px; flex-shrink: 0; }
        .logo { color: #00ff88; font-weight: bold; text-align: center; font-size: 1.2rem; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #1a1a1a; }
        .nav-link { display: block; padding: 12px; color: #888; text-decoration: none; cursor: pointer; border-radius: 6px; margin-bottom: 5px; transition: 0.3s; font-size: 0.9rem; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ff88; }

        /* Main Area */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .tab-content { display: none; }
        
        /* Stats */
        .card { background: #111; padding: 20px; border-radius: 10px; border-left: 4px solid #00ff88; display: inline-block; min-width: 200px; margin-bottom: 20px; }
        .card span { font-size: 0.8rem; color: #666; display: block; }
        .card b { font-size: 1.8rem; color: #00ff88; }

        /* Table */
        .table-container { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; padding: 15px; text-align: left; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        
        /* Badges */
        .status { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .status.ativada { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        
        /* Inputs & Buttons */
        .box { background: #111; padding: 25px; border-radius: 10px; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: #00ff88; color: #000; border: none; padding: 14px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .reset { background: none; border: 1px solid #00ff88; color: #00ff88; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .reset:hover { background: #00ff88; color: #000; }
    </style>
</head>
<body>

<aside>
    <div class="logo">VORTEX RESELLER</div>
    <a class="nav-link active" onclick="showTab('tab-vendas')">📦 Minhas Vendas</a>
    <a class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Key</a>
</aside>

<main>
    <div id="tab-vendas" class="tab-content" style="display:block">
        <div class="card">
            <span>Total de Keys Geradas</span>
            <b id="count-vendas">0</b>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Key</th>
                        <th>Status</th>
                        <th>Validade</th>
                        <th>ID Device</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gerar" class="tab-content">
        <div class="box">
            <h3 style="color:#00ff88; margin-top:0;">Criar Novo Acesso</h3>
            <label style="font-size: 0.8rem; color: #555;">Prefixo do Revendedor</label>
            <input type="text" id="k_prefix" value="VORTEX">
            
            <label style="font-size: 0.8rem; color: #555;">Dias de Acesso</label>
            <input type="number" id="k_dias" value="30">
            
            <button class="btn-main" onclick="gerarKeyCliente()">GERAR E SALVAR</button>
        </div>
    </div>
</main>

</body>
</html>
