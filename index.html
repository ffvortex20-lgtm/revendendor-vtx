<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | REVENDA PANEL</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let revendedorLogado = localStorage.getItem("vortex_user");

        window.onload = () => {
            if (revendedorLogado) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                init();
            }
        };

        window.tentarLogin = async () => {
            const user = document.getElementById('login_user').value;
            const pass = document.getElementById('login_pass').value;

            const snapshot = await get(ref(db, `Resellers/${user}`));
            if (snapshot.exists() && snapshot.val().pass === pass) {
                revendedorLogado = user;
                localStorage.setItem("vortex_user", user);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                init();
            } else {
                alert("Login ou Senha incorretos!");
            }
        };

        window.logout = () => {
            localStorage.removeItem("vortex_user");
            location.reload();
        };

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        };

        function init() {
            onValue(ref(db, `Resellers/${revendedorLogado}`), (snapshot) => {
                const data = snapshot.val();
                document.getElementById('meus-creditos').innerText = data.credits || 0;
            });

            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let countAtivas = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    if (data.criadoPor === revendedorLogado) {
                        countAtivas++;
                        list.innerHTML += `
                            <tr>
                                <td><span class="badge-key">${data.key}</span></td>
                                <td><span class="status-dot ${data.status}"></span> ${data.status}</td>
                                <td>${data.validade} Dias</td>
                                <td class="uid-col">${data.uid}</td>
                                <td class="actions">
                                    <button class="btn-action yellow" onclick="resetHWID('${child.key}')">🔄 Reset</button>
                                    <button class="btn-action del" onclick="excluirKey('${child.key}')">🗑 Excluir</button>
                                </td>
                            </tr>`;
                    }
                });
                document.getElementById('count-ativas').innerText = countAtivas;
            });
        }

        window.resetHWID = (id) => {
            update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "Resetado pelo Revendedor" });
            alert("HWID Resetado!");
        };

        window.excluirKey = (id) => {
            if(confirm("Deseja deletar esta key?")) remove(ref(db, `KeysUsers/${id}`));
        };

        window.gerarKey = async () => {
            const prefix = document.getElementById('k_prefix').value || "VTX";
            const dias = document.getElementById('k_dias').value || "30";
            
            const resRef = ref(db, `Resellers/${revendedorLogado}`);
            const resSnap = await get(resRef);
            const credits = resSnap.val().credits || 0;

            if (credits > 0) {
                const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
                const keyId = "KEY-" + Date.now();

                await set(ref(db, `KeysUsers/${keyId}`), {
                    key: novaKey,
                    status: "ativada",
                    uid: "RESETADO",
                    validade: dias,
                    criadoPor: revendedorLogado,
                    dispositivos: "1"
                });

                await update(resRef, { credits: credits - 1 });
                alert("Key gerada: " + novaKey);
            } else {
                alert("Você não tem créditos suficientes!");
            }
        };
    </script>

    <style>
        :root {
            --neon-blue: #00d2ff; --neon-green: #00ff88; --neon-red: #ff3e3e;
            --bg-dark: #08080a; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #08080a);
        }

        /* Login Screen */
        #login-screen { position: fixed; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: var(--glass); padding: 40px; border-radius: 20px; border: 1px solid var(--neon-green); 
            text-align: center; backdrop-filter: blur(10px); width: 320px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        /* Sidebar */
        aside {
            width: 260px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border); padding: 30px 20px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--neon-green); text-align: center; margin-bottom: 40px; letter-spacing: 2px; }

        .nav-link {
            padding: 14px 18px; color: #888; text-decoration: none; cursor: pointer;
            border-radius: 12px; margin-bottom: 10px; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; font-weight: 500;
        }

        .nav-link:hover, .nav-link.active { background: var(--glass); color: var(--neon-green); border: 1px solid var(--glass-border); }

        .music-player { margin-top: auto; border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); opacity: 0.7; transition: 0.3s; }
        .music-player:hover { opacity: 1; }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; animation: slideUp 0.4s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 18px; flex: 1; backdrop-filter: blur(5px); }
        .card span { font-size: 0.75rem; color: #666; text-transform: uppercase; }
        .card b { font-size: 1.8rem; display: block; color: var(--neon-green); }

        /* Table */
        .table-container { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 15px; text-align: left; color: #444; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--glass-border); font-size: 0.85rem; }

        .badge-key { background: rgba(0, 255, 136, 0.1); color: var(--neon-green); padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.ativada { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* Actions */
        .btn-action { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        .btn-action.yellow:hover { background: #ffbb00; color: #000; }
        .btn-action.del:hover { background: var(--neon-red); color: #fff; }

        /* Box Form */
        .box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border); max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--neon-green); color: #000; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .uid-col { color: #555; font-family: monospace; font-size: 0.7rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--neon-green); margin-bottom: 25px;">VORTEX LOGIN</h2>
            <input type="text" id="login_user" placeholder="Usuário">
            <input type="password" id="login_pass" placeholder="Senha">
            <button class="btn-main" onclick="tentarLogin()">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="main-panel" style="display:none; width: 100%;">
        <aside>
            <div class="logo">VORTEX REVENDA</div>
            <nav>
                <div class="nav-link active" onclick="showTab('tab-clientes')">📦 Meus Clientes</div>
                <div class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Nova Key</div>
                <div class="nav-link" style="color: var(--neon-red); margin-top: 20px;" onclick="logout()">❌ Sair</div>
            </nav>

            <div class="music-player">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Ueb9CidzhR?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            </div>
        </aside>

        <main>
            <div id="tab-clientes" class="tab-content active">
                <div class="stats">
                    <div class="card"><span>Meus Créditos</span><b id="meus-creditos">0</b></div>
                    <div class="card"><span>Chaves Geradas</span><b id="count-ativas">0</b></div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Key</th><th>Status</th><th>Validade</th><th>Device ID</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-gerar" class="tab-content">
                <div class="box">
                    <h3 style="margin-top:0">Gerar Nova Licença</h3>
                    <p style="color:#666; font-size: 0.8rem;">Cada geração consome 1 crédito do seu saldo.</p>
                    <input type="text" id="k_prefix" placeholder="Prefixo da Key (Ex: VIP)">
                    <input type="number" id="k_dias" value="30">
                    <button class="btn-main" onclick="gerarKey()">GERAR AGORA</button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
