<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | REVENDA PANEL</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let revendedorLogado = null;

        // --- SISTEMA DE LOGIN ---
        window.tentarLogin = async () => {
            const user = document.getElementById('login_user').value;
            const pass = document.getElementById('login_pass').value;

            const snapshot = await get(ref(db, `Resellers/${user}`));
            if (snapshot.exists() && snapshot.val().pass === pass) {
                revendedorLogado = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                init();
            } else {
                alert("Usuário ou senha incorretos!");
            }
        };

        // --- NAVEGAÇÃO ---
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- LISTAGEM E CRÉDITOS ---
        function init() {
            // Monitorar Créditos
            onValue(ref(db, `Resellers/${revendedorLogado}/credits`), (snapshot) => {
                document.getElementById('meus-creditos').innerText = snapshot.val() || 0;
            });

            // Monitorar Clientes
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let total = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    // Opcional: Filtrar apenas keys criadas por este revendedor
                    // if(data.criadoPor === revendedorLogado) { ... }
                    
                    list.innerHTML += `
                        <tr>
                            <td><b>${data.key}</b></td>
                            <td><span class="status ${data.status}">${data.status}</span></td>
                            <td>${data.validade} Dias</td>
                            <td class="uid-col">${data.uid}</td>
                            <td class="actions">
                                <button class="reset" onclick="resetHWID('${child.key}')">Reset</button>
                                <button class="del" onclick="excluirKey('${child.key}')">Excluir</button>
                            </td>
                        </tr>`;
                    total++;
                });
                document.getElementById('count-vendas').innerText = total;
            });
        }

        // --- AÇÕES ---
        window.resetHWID = (id) => {
            if(confirm("Resetar dispositivo do cliente?")) {
                update(ref(db, `KeysUsers/${id}`), { uid: "AGUARDANDO LOGIN", device: "Resetado" });
            }
        };

        window.excluirKey = (id) => {
            if(confirm("Excluir esta key permanentemente?")) {
                remove(ref(db, `KeysUsers/${id}`));
            }
        };

        window.gerarKeyCliente = async () => {
            const snapCred = await get(ref(db, `Resellers/${revendedorLogado}/credits`));
            const creditosAtuais = snapCred.val() || 0;

            if (creditosAtuais <= 0) {
                return alert("Você não tem créditos suficientes!");
            }

            const prefix = document.getElementById('k_prefix').value || "REV";
            const dias = document.getElementById('k_dias').value || "30";
            const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
            const id = "KEY-" + Date.now();
            
            // Salvar Key e Descontar Crédito
            await set(ref(db, `KeysUsers/${id}`), {
                key: novaKey, status: "ativada", uid: "AGUARDANDO LOGIN", 
                validade: dias, criadoPor: revendedorLogado
            });

            await update(ref(db, `Resellers/${revendedorLogado}`), {
                credits: creditosAtuais - 1
            });

            alert("Key Gerada: " + novaKey);
        };
    </script>

    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Tela de Login */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-box { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #1a1a1a; width: 300px; text-align: center; }
        
        /* Painel Principal */
        #main-panel { display: none; height: 100vh; }
        aside { width: 220px; background: #000; border-right: 1px solid #1a1a1a; padding: 20px; flex-shrink: 0; }
        .logo { color: #00ff88; font-weight: bold; text-align: center; font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        .nav-link { display: block; padding: 12px; color: #666; text-decoration: none; cursor: pointer; border-radius: 6px; margin-bottom: 5px; font-weight: bold; }
        .nav-link:hover, .nav-link.active { background: #111; color: #00ff88; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { background: #111; padding: 15px; border-radius: 10px; flex: 1; border-left: 4px solid #00ff88; }
        .card b { font-size: 1.5rem; color: #00ff88; display: block; }

        .table-container { background: #111; border-radius: 10px; border: 1px solid #1a1a1a; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; padding: 12px; text-align: left; font-size: 0.7rem; color: #555; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.8rem; }
        
        .status.ativada { color: #00ff88; }
        .actions { display: flex; gap: 5px; }
        .actions button { padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; border: 1px solid #333; background: #000; color: #fff; }
        .actions .del { background: #ff4444; border: none; }

        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: #00ff88; color: #000; border: none; padding: 14px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .box { background: #111; padding: 25px; border-radius: 10px; max-width: 400px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00ff88;">VORTEX LOGIN</h2>
            <input type="text" id="login_user" placeholder="Usuário">
            <input type="password" id="login_pass" placeholder="Senha">
            <button class="btn-main" onclick="tentarLogin()">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="main-panel">
        <aside>
            <div class="logo">VORTEX REVENDA</div>
            <a class="nav-link active" onclick="showTab('tab-vendas')">📦 Clientes</a>
            <a class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Key</a>
        </aside>

        <main>
            <div id="tab-vendas" class="tab-content" style="display:block">
                <div class="stats">
                    <div class="card"><span>Meus Créditos</span><b id="meus-creditos">0</b></div>
                    <div class="card"><span>Keys Ativas</span><b id="count-vendas">0</b></div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Key</th><th>Status</th><th>Duração</th><th>Device ID</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-gerar" class="tab-content">
                <div class="box">
                    <h3>Gerar Nova Key</h3>
                    <p style="font-size: 0.8rem; color: #666;">Cada key gerada desconta 1 crédito.</p>
                    <input type="text" id="k_prefix" placeholder="Prefixo da Key">
                    <input type="number" id="k_dias" value="30" placeholder="Dias de validade">
                    <button class="btn-main" onclick="gerarKeyCliente()">GERAR AGORA (-1 CRÉDITO)</button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
