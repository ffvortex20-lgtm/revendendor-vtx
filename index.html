<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | REVENDA PANEL</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let revendedorLogado = localStorage.getItem("vortex_user");

        // --- VERIFICAÇÃO DE SESSÃO ---
        window.onload = () => {
            if (revendedorLogado) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                init();
            }
        };

        window.tentarLogin = async () => {
            const user = document.getElementById('login_user').value;
            const pass = document.getElementById('login_pass').value;

            const snapshot = await get(ref(db, `Resellers/${user}`));
            if (snapshot.exists() && snapshot.val().pass === pass) {
                revendedorLogado = user;
                localStorage.setItem("vortex_user", user);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                init();
            } else {
                alert("Login ou Senha incorretos!");
            }
        };

        window.logout = () => {
            localStorage.removeItem("vortex_user");
            location.reload();
        };

        // --- NAVEGAÇÃO ---
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- INICIALIZAÇÃO E FILTRO ---
        function init() {
            // Monitorar Créditos do Revendedor
            onValue(ref(db, `Resellers/${revendedorLogado}`), (snapshot) => {
                const data = snapshot.val();
                document.getElementById('meus-creditos').innerText = data.credits || 0;
            });

            // Monitorar apenas Keys deste revendedor
            onValue(ref(db, 'KeysUsers'), (snapshot) => {
                const list = document.getElementById('userTable');
                list.innerHTML = "";
                let countAtivas = 0;

                snapshot.forEach((child) => {
                    const data = child.val();
                    // SÓ MOSTRA SE A KEY FOI CRIADA POR ELE
                    if (data.criadoPor === revendedorLogado) {
                        countAtivas++;
                        list.innerHTML += `
                            <tr>
                                <td><b>${data.key}</b></td>
                                <td><span class="status ${data.status}">${data.status}</span></td>
                                <td>${data.validade} Dias</td>
                                <td class="uid-col">${data.uid}</td>
                                <td class="actions">
                                    <button class="reset" onclick="resetHWID('${child.key}')">Reset</button>
                                    <button class="del" onclick="excluirKey('${child.key}')">Excluir</button>
                                </td>
                            </tr>`;
                    }
                });
                document.getElementById('count-ativas').innerText = countAtivas;
            });
        }

        // --- FUNÇÕES ---
        window.resetHWID = (id) => {
            update(ref(db, `KeysUsers/${id}`), { uid: "RESETADO", device: "Resetado pelo Revendedor" });
        };

        window.excluirKey = (id) => {
            if(confirm("Deseja deletar esta key?")) remove(ref(db, `KeysUsers/${id}`));
        };

        window.gerarKey = async () => {
            const prefix = document.getElementById('k_prefix').value || "VTX";
            const dias = document.getElementById('k_dias').value || "30";
            
            const resRef = ref(db, `Resellers/${revendedorLogado}`);
            const resSnap = await get(resRef);
            const credits = resSnap.val().credits || 0;

            if (credits > 0) {
                const novaKey = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
                const keyId = "KEY-" + Date.now();

                // Salva a key vinculada ao revendedor
                await set(ref(db, `KeysUsers/${keyId}`), {
                    key: novaKey,
                    status: "ativada",
                    uid: "RESETADO",
                    validade: dias,
                    criadoPor: revendedorLogado,
                    dispositivos: "1"
                });

                // Desconta o crédito
                await update(resRef, { credits: credits - 1 });
                alert("Key gerada com sucesso!");
            } else {
                alert("Você não tem créditos!");
            }
        };
    </script>

    <style>
        body { margin: 0; background: #080808; color: #fff; font-family: sans-serif; display: flex; height: 100vh; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 10px; border: 1px solid #00ff88; text-align: center; }
        
        aside { width: 200px; background: #000; padding: 20px; border-right: 1px solid #111; }
        .logo { color: #00ff88; font-weight: bold; margin-bottom: 30px; }
        .nav-link { display: block; padding: 10px; color: #888; text-decoration: none; cursor: pointer; margin-bottom: 5px; border-radius: 5px; }
        .nav-link.active { background: #111; color: #00ff88; }
        
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; flex: 1; border-top: 2px solid #00ff88; }
        .card b { font-size: 25px; color: #00ff88; }
        
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 10px; }
        th { text-align: left; padding: 15px; color: #444; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        
        .status.ativada { color: #00ff88; }
        .status.pausada { color: #ffbb00; }
        
        .box { background: #111; padding: 20px; border-radius: 10px; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; box-sizing: border-box; }
        button.btn-main { background: #00ff88; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        
        .actions button { padding: 5px 10px; cursor: pointer; border-radius: 3px; border: none; font-size: 11px; margin-right: 5px; }
        .reset { background: #333; color: #fff; }
        .del { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>VORTEX LOGIN</h2>
            <input type="text" id="login_user" placeholder="Usuário">
            <input type="password" id="login_pass" placeholder="Senha">
            <button class="btn-main" onclick="tentarLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="main-panel" style="display:none; width: 100%;">
        <aside>
            <div class="logo">VORTEX REVENDA</div>
            <a class="nav-link active" onclick="showTab('tab-clientes')">📦 Clientes</a>
            <a class="nav-link" onclick="showTab('tab-gerar')">🔑 Gerar Key</a>
            <a class="nav-link" style="color: #ff4444; margin-top: 50px;" onclick="logout()">Sair</a>
        </aside>

        <main>
            <div id="tab-clientes" class="tab-content">
                <div class="stats">
                    <div class="card"><span>Meus Créditos</span><br><b id="meus-creditos">0</b></div>
                    <div class="card"><span>Keys Ativas</span><br><b id="count-ativas">0</b></div>
                </div>
                <table>
                    <thead>
                        <tr><th>Key</th><th>Status</th><th>Duração</th><th>Device ID</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>

            <div id="tab-gerar" class="tab-content" style="display:none">
                <div class="box">
                    <h3>Gerar Nova Key</h3>
                    <input type="text" id="k_prefix" placeholder="Prefixo da Key">
                    <input type="number" id="k_dias" value="30">
                    <button class="btn-main" onclick="gerarKey()">GERAR AGORA (-1 CRÉDITO)</button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
